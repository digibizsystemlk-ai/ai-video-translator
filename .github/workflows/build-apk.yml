name: Build Android APK (Cloud Compiler)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Web Application
        run: |
          cd frontend
          npm run build

      - name: Sync Assets to Android Project
        run: |
          cd frontend
          npx cap sync

      - name: Build Android Debug APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Generated APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Translator-Mobile-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
